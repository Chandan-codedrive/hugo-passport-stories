<div class="row g-4">

  {{ range (where site.RegularPages "Section" "group-travel").ByWeight }}

  <div class="col-12 col-md-6 col-xl-3">

    <div class="travel-card">

      <img src="{{ .Params.image }}" alt="{{ .Title }}">

      <div class="travel-info">
        <h3>{{ .Title }}</h3>

        <p>{{ .Summary }}</p>

        <p class="price">
          From ₹{{ .Params.price }}
        </p>

        <a href="{{ .RelPermalink }}" class="btn">
          Book Now
        </a>
      </div>

    </div>

  </div>

  {{ end }}

</div>
