<section
    class="story-section"
    style="background-image:url('{{ .Params.background_image | relURL }}');
           background-size:cover;
           background-position:center;
           background-repeat:no-repeat;">

    <div class="story-overlay"></div>

    <div class="container-fluid px-5">
        <div class="row align-items-center">

            <div class="col-lg-7">
                <h2 class="story-title">
                    {{ .Params.story.title }}
                </h2>

                {{ range .Params.story.paragraphs }}
                <p>{{ . }}</p>
                {{ end }}
            </div>

            <div class="col-lg-5 story-images">

                <div class="img-top mb-4">
                    <img src="{{ .Params.story.images.top | relURL }}" alt="Travel Adventure">
                </div>

                <div class="img-bottom">
                    <img src="{{ .Params.story.images.bottom | relURL }}" alt="Travel Memories">
                </div>

            </div>

        </div>
    </div>

</section>
